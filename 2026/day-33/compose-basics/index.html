<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Compose File - Nginx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 20px;
            color: #f1f1f1;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 First Compose File</h1>
        <h2>Nginx with Docker Compose</h2>
        <p>
            This is my first Docker Compose project running Nginx.
        </p>
        <div class="badge">Day 33 - Docker Compose</div>
        <div class="footer">
            Running successfully on port 8080
        </div>
    </div>
</body>
</html>
