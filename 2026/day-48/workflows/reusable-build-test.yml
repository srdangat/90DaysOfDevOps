name: Reusable — Build & Test

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version to use'
        type: string
        default: '24'
      run_tests:
        description: 'Whether to run tests'
        type: boolean
        default: true
    outputs:
      test_result:
        description: 'Result of the test run: passed or failed'
        value: ${{ jobs.build-test.outputs.test_result }}

jobs:
  build-test:
    name: Build & Test (Node ${{ inputs.node_version }})
    runs-on: ubuntu-latest

    outputs:
      test_result: ${{ steps.set-result.outputs.test_result }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        if: ${{ inputs.run_tests == true }}
        id: run-tests
        run: npm test

      - name: Set output
        id: set-result
        if: always()
        run: |
          if [[ "${{ steps.run-tests.outcome }}" == "success" || "${{ inputs.run_tests }}" == "false" ]]; then
            echo "test_result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "test_result=failed" >> "$GITHUB_OUTPUT"
          fi